replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  hfTokenSecret: ""
  hfEndpoint: https://hf-mirror.com
  # Path on the worker node where HF model weights are pre-staged.
  # Mounted into the vLLM container as HF_HUB_CACHE so weights are
  # read from local disk instead of re-downloaded. Leave empty to
  # fall back to the in-container cache + HF_ENDPOINT.
  hfCachePath: ""

gpu:
  vendor: none
  limit: 1

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

vllm:
  args: []
  port: 8000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: llm.local
  path: /

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

serviceMonitor:
  enabled: false
  interval: 30s

nodeSelector: {}
tolerations: []
affinity: {}
