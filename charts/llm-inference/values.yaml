replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  hfTokenSecret: ""

gpu:
  vendor: none
  limit: 1

resources:
  requests:
    cpu: "2"
    memory: "8Gi"
  limits:
    cpu: "8"
    memory: "16Gi"

vllm:
  args: []
  port: 8000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: llm.local
  path: /

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

serviceMonitor:
  enabled: false
  interval: 30s

nodeSelector: {}
tolerations: []
affinity: {}
