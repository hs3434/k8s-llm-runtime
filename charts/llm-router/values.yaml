replicaCount: 2

image:
  repository: k8s-llm-runtime/router
  tag: "0.1.0"
  pullPolicy: IfNotPresent

models:
  aliases:
    qwen-7b: Qwen/Qwen2.5-7B-Instruct
    qwen-0.5b: Qwen/Qwen2.5-0.5B-Instruct
  defaultGpu:
    vendor: amd
    limit: 1
  idleTimeoutSeconds: 600
  deployLockTtl: 600

targetNamespace: llm-models

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: router.local

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: false

podAnnotations: {}
