apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: nvidia-device-plugin
      nodeSelector:
        k8s-llm-runtime/gpu: "true"
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.2
          imagePullPolicy: IfNotPresent
          env:
            - name: CDI_ENABLED
              value: "true"
            - name: DEVICE_DISCOVERY_STRATEGY
              value: nvml
            - name: DEVICE_LIST_STRATEGY
              value: cdi-annotations
            - name: LD_LIBRARY_PATH
              value: /driver-root/usr/lib/x86_64-linux-gnu
            - name: NVIDIA_DEVICE_PLUGIN_CONFIG
              value: /etc/nvidia-device-plugin/config.yaml
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdi
              mountPath: /var/run/cdi
            - name: dev
              mountPath: /dev
            - name: config
              mountPath: /etc/nvidia-device-plugin
            - name: nvidia-driver-libs
              mountPath: /driver-root/usr/lib/x86_64-linux-gnu
              readOnly: true
            - name: nvidia-smi
              mountPath: /usr/bin/nvidia-smi
              readOnly: true
            - name: nvidia-smi
              mountPath: /driver-root/usr/bin/nvidia-smi
              readOnly: true
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
        - name: nvidia-driver-libs
          hostPath:
            path: /opt/nvidia-driver-libs
        - name: nvidia-smi
          hostPath:
            path: /usr/bin/nvidia-smi
        - name: config
          configMap:
            name: nvidia-device-plugin
            items:
              - key: config.yaml
                path: config.yaml
            optional: true
